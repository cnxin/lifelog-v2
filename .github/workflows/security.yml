name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每周一凌晨 2 点运行
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  # 依赖安全扫描
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known vulnerabilities in dependencies..."
          flutter pub outdated --json > outdated.json || true

          # 检查是否有严重过期的依赖
          if [ -f outdated.json ]; then
            echo "Outdated dependencies report generated"
            cat outdated.json
          fi

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: outdated.json
          retention-days: 30

  # 代码安全扫描
  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run static analysis
        run: flutter analyze --fatal-infos

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."

          # 检查常见的敏感信息模式
          if grep -r -i "password\s*=\s*['\"]" lib/ --include="*.dart" | grep -v "// "; then
            echo "⚠️ Warning: Found potential hardcoded passwords"
            exit 1
          fi

          if grep -r -i "api[_-]?key\s*=\s*['\"]" lib/ --include="*.dart" | grep -v "// "; then
            echo "⚠️ Warning: Found potential hardcoded API keys"
            exit 1
          fi

          if grep -r -i "secret\s*=\s*['\"]" lib/ --include="*.dart" | grep -v "// "; then
            echo "⚠️ Warning: Found potential hardcoded secrets"
            exit 1
          fi

          echo "✅ No obvious hardcoded secrets found"

      - name: Check for SQL injection risks
        run: |
          echo "Checking for potential SQL injection vulnerabilities..."

          # 检查是否有字符串拼接的 SQL 查询
          if grep -r "'\s*\+\s*" lib/database/ --include="*.dart" | grep -i "select\|insert\|update\|delete"; then
            echo "⚠️ Warning: Found potential SQL injection risk (string concatenation in queries)"
            echo "Please use parameterized queries instead"
            exit 1
          fi

          echo "✅ No obvious SQL injection risks found"

      - name: Check for insecure HTTP usage
        run: |
          echo "Checking for insecure HTTP usage..."

          # 检查是否有硬编码的 HTTP URL
          if grep -r "http://" lib/ --include="*.dart" | grep -v "localhost\|127.0.0.1\|//"; then
            echo "⚠️ Warning: Found HTTP URLs (should use HTTPS)"
            exit 1
          fi

          echo "✅ No insecure HTTP usage found"

  # Android 安全检查
  android-security:
    name: Android Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AndroidManifest.xml
        run: |
          echo "Checking Android security configurations..."

          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # 检查是否允许备份（生产环境应禁用）
          if grep -q 'android:allowBackup="true"' "$MANIFEST"; then
            echo "⚠️ Warning: allowBackup is enabled (consider disabling for production)"
          fi

          # 检查是否使用明文流量（应禁用）
          if grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            echo "⚠️ Warning: Cleartext traffic is allowed (should be disabled)"
          fi

          # 检查是否导出了不必要的组件
          if grep -q 'android:exported="true"' "$MANIFEST"; then
            echo "ℹ️ Info: Found exported components, please verify they are necessary"
          fi

          echo "✅ Android manifest check completed"

      - name: Check for debug mode
        run: |
          echo "Checking for debug configurations..."

          if grep -r "debuggable\s*true" android/ --include="*.gradle" --include="*.kts"; then
            echo "⚠️ Warning: Found debuggable=true in gradle files"
            exit 1
          fi

          echo "✅ No debug mode found in release configs"

  # iOS 安全检查
  ios-security:
    name: iOS Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Info.plist
        run: |
          echo "Checking iOS security configurations..."

          PLIST="ios/Runner/Info.plist"

          # 检查是否允许任意加载（应禁用）
          if grep -q "NSAllowsArbitraryLoads" "$PLIST"; then
            echo "⚠️ Warning: NSAllowsArbitraryLoads found (allows insecure HTTP)"
          fi

          # 检查权限描述是否完整
          if ! grep -q "NSPhotoLibraryUsageDescription" "$PLIST"; then
            echo "⚠️ Warning: Missing photo library usage description"
          fi

          if ! grep -q "NSCameraUsageDescription" "$PLIST"; then
            echo "⚠️ Warning: Missing camera usage description"
          fi

          echo "✅ iOS Info.plist check completed"

  # 生成安全报告
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, android-security, ios-security]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Date**: $(date)" >> security-report.md
          echo "**Commit**: ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "" >> security-report.md
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-report.md
          echo "- Code Scan: ${{ needs.code-scan.result }}" >> security-report.md
          echo "- Android Security: ${{ needs.android-security.result }}" >> security-report.md
          echo "- iOS Security: ${{ needs.ios-security.result }}" >> security-report.md
          echo "" >> security-report.md
          echo "For detailed results, check the individual job logs." >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 90
