<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="120" fill="url(#grad1)"/>

  <!-- Book icon with glass effect -->
  <g filter="url(#shadow)">
    <!-- Book pages -->
    <rect x="140" y="120" width="232" height="272" rx="16" fill="white" opacity="0.95"/>

    <!-- Book spine -->
    <rect x="248" y="120" width="16" height="272" fill="white" opacity="0.7"/>

    <!-- Bookmark -->
    <path d="M 256 120 L 256 240 L 276 220 L 296 240 L 296 120 Z" fill="#6C63FF" opacity="0.8"/>

    <!-- Heart icon (memory/favorite) -->
    <path d="M 256 340 C 256 340 200 300 200 260 C 200 240 210 220 230 220 C 240 220 250 225 256 235 C 262 225 272 220 282 220 C 302 220 312 240 312 260 C 312 300 256 340 256 340 Z"
          fill="#FF6B9D" opacity="0.9"/>
  </g>

  <!-- Glass effect overlay -->
  <rect x="140" y="120" width="116" height="272" rx="16" fill="white" opacity="0.1"/>
</svg>
