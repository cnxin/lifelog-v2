name: lifelog_flutter_demo
description: LifeLog Flutter + Material Design 3 - 生活记录应用
publish_to: 'none'
version: 1.0.0+1

repository: https://github.com/your-repo/lifelog-flutter-demo
homepage: https://github.com/your-repo/lifelog-flutter-demo

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  lunar: ^1.7.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
